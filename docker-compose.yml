version: '3.8'

# OBSOLETO como compose unico.
# Usa:
#   docker-compose.fabric.yml  → solo Fabric
#   docker-compose.app.yml     → solo API (conectada a red music-royalty-fabric)
# En Windows preferir: FABRIC-UP.bat + APP-UP.bat

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-royalty-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - CHANNEL_NAME=mychannel
      - CHAINCODE_NAME=music-royalty
      - ALLOW_SIMULATION=${ALLOW_SIMULATION:-false}
      - FABRIC_AS_LOCALHOST=false
      - CONNECTION_PROFILE=/app/connection-docker.json
    volumes:
      - ./wallet:/app/wallet
      - ./connection.json:/app/connection.json:ro
      - ./connection-docker.json:/app/connection-docker.json:ro
    networks:
      - music-royalty-app
      - music-royalty-fabric
    restart: unless-stopped

networks:
  music-royalty-app:
    driver: bridge
  music-royalty-fabric:
    external: true
    name: music-royalty-fabric
