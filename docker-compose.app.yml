# =============================================================================
# Stack SOLO aplicación (API Express). El frontend suele ir por Vite en el host.
# Se conecta a Fabric en la red externa music-royalty-fabric (FABRIC-UP.bat).
#
# Uso típico Windows (host):
#   1) FABRIC-UP.bat
#   2) APP-UP.bat
#
# Uso Docker de la API:
#   docker compose -f docker-compose.app.yml up -d --build
# =============================================================================
name: music-royalty-app

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-royalty-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - CHANNEL_NAME=mychannel
      - CHAINCODE_NAME=music-royalty
      - ALLOW_SIMULATION=${ALLOW_SIMULATION:-false}
      - FABRIC_AS_LOCALHOST=false
      - CONNECTION_PROFILE=/app/connection-docker.json
    volumes:
      - ./wallet:/app/wallet
      - ./connection.json:/app/connection.json:ro
      - ./connection-docker.json:/app/connection-docker.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - music-royalty-app
      - music-royalty-fabric
    restart: unless-stopped

networks:
  music-royalty-app:
    driver: bridge
  music-royalty-fabric:
    external: true
    name: music-royalty-fabric
